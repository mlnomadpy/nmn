name: Feature Request
description: Suggest a new feature, layer, or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! For large additions (new layer families, new framework backends), consider opening a [discussion](https://github.com/azettaai/nmn/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Why does the current API fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, ideally with example API usage.
      render: python
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Frameworks affected
      multiple: true
      options:
        - PyTorch (nmn.torch)
        - Flax NNX (nmn.nnx)
        - Flax Linen (nmn.linen)
        - Keras (nmn.keras)
        - TensorFlow (nmn.tf)
        - All frameworks
        - Build / packaging
        - Documentation
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and their trade-offs.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to papers, related issues, prior art.
